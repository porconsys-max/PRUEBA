<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Registro de Asistencia - Visor de Errores</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 20px;
            color: var(--text);
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-surface);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .scanner-status {
            background: var(--primary);
            color: white;
            border-radius: 50px;
            padding: 6px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
        #qr-reader {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: #f1f5f9;
        }
        #qr-reader video {
            border-radius: 16px;
            max-height: 350px;
            object-fit: cover;
        }
        .notification {
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            animation: slideUp 0.3s ease;
        }
        .success {
            background: #e6f4ea;
            border-left: 6px solid var(--success);
        }
        .error {
            background: #fce8e6;
            border-left: 6px solid var(--danger);
        }
        .info-row {
            display: flex;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-label {
            font-weight: 700;
            width: 100px;
            color: #64748b;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .btn {
            display: inline-block;
            background: #f1f5f9;
            color: var(--text);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover {
            background: #e2e8f0;
        }
        .text-center {
            text-align: center;
        }
        .mt-3 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .d-flex { display: flex; align-items: center; gap: 8px; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .opacity-50 { opacity: 0.5; }
        /* Estilo para el bloque de error completo */
        .error-detail {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 12px;
            margin-top: 8px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #f1e2e1;
            color: #b91c1c;
            overflow-x: auto;
        }
        pre {
            margin: 0;
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="scanner-status">
            <div class="pulse"></div>
            <span id="status-text">Esperando código QR...</span>
        </div>
        <div id="qr-reader"></div>
    </div>

    <div id="resultado" style="display: none;" class="notification"></div>

    <div class="text-center mt-3">
        <div class="d-flex justify-center gap-2 mb-4">
            <span><i class="far fa-clock"></i> <span id="current-time">--:--:--</span></span>
            <span class="opacity-50">|</span>
            <span><i class="far fa-calendar-alt"></i> <span id="current-date"></span></span>
        </div>
        <a href="#" class="btn" onclick="location.reload(); return false;">
            <i class="fas fa-sync-alt"></i> Reiniciar escáner
        </a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
    // ================= CONFIGURACIÓN =================
    // Reemplaza con tu URL real del API (Google Apps Script)
    const API_URL = "https://script.google.com/macros/s/AKfycbyCXPCs06-EdQXGbWefl4d8z42kNo4huY7Si5xEGj8cy1SwRpTQGwOy3Pk47sqf1nQM/exec";
    let scanPaused = false;
    let lastScanTime = 0;

    // Helper: Escapar HTML para evitar XSS en mensajes de error crudos
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    // Mostrar fecha/hora en tiempo real
    function updateDateTime() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('es-PE');
        document.getElementById('current-date').innerText = now.toLocaleDateString('es-PE', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    /**
     * Muestra notificación de éxito o error.
     * @param {boolean} success - true si fue éxito, false si error.
     * @param {object|string} data - Para éxito: objeto con datos del alumno/asistencia.
     *                                Para error: puede ser objeto con campo 'error' o texto crudo, o cualquier estructura.
     */
    function showMessage(success, data) {
        const resultDiv = document.getElementById('resultado');
        resultDiv.style.display = 'block';

        if (success) {
            // ÉXITO: mostrar información del estudiante y asistencia
            resultDiv.className = 'notification success';
            resultDiv.innerHTML = `
                <div class="d-flex gap-2 mb-2">
                    <i class="fas fa-check-circle" style="color: var(--success); font-size: 1.5rem;"></i>
                    <h5 class="mb-0">¡Registro exitoso!</h5>
                </div>
                <div class="info-row">
                    <span class="info-label">Estudiante</span>
                    <span>${escapeHtml(data.alumno?.nombres || '')} ${escapeHtml(data.alumno?.apellidos || '')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Grado/Sección</span>
                    <span>${escapeHtml(data.alumno?.grado || '')} - ${escapeHtml(data.alumno?.seccion || '')}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Hora</span>
                    <span>${escapeHtml(data.asistencia?.hora || '')}</span>
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted">Reanudando en 3 segundos...</small>
                </div>
            `;
            setTimeout(() => {
                resultDiv.style.display = 'none';
                scanPaused = false;
            }, 3000);
        } else {
            // ERROR: mostrar EL ERROR COMPLETO tal cual viene del API (sin ocultar detalles)
            let errorFullText = '';
            
            // Caso 1: data es una cadena de texto (ej. error de conexión simple)
            if (typeof data === 'string') {
                errorFullText = data;
            } 
            // Caso 2: data es un objeto con campo 'error' (string)
            else if (data && typeof data === 'object') {
                if (data.error && typeof data.error === 'string') {
                    errorFullText = data.error;
                } 
                // Si el objeto tiene otro campo o es una estructura compleja, mostramos el JSON completo
                else {
                    try {
                        errorFullText = JSON.stringify(data, null, 2);
                    } catch (e) {
                        errorFullText = String(data);
                    }
                }
            } 
            // Caso 3: cualquier otro tipo (número, etc)
            else {
                errorFullText = String(data);
            }
            
            // Escapamos para evitar inyecciones, pero preservamos el formato
            const safeError = escapeHtml(errorFullText);
            
            resultDiv.className = 'notification error';
            resultDiv.innerHTML = `
                <div class="d-flex gap-2 mb-2">
                    <i class="fas fa-exclamation-triangle" style="color: var(--danger); font-size: 1.5rem;"></i>
                    <h5 class="mb-0">Error desde el servidor / API</h5>
                </div>
                <div class="error-detail">
                    <strong><i class="fas fa-code"></i> Respuesta completa:</strong>
                    <pre style="margin-top: 8px; font-size: 0.8rem; line-height: 1.4;">${safeError}</pre>
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted">Reintentando en 5 segundos...</small>
                </div>
            `;
            setTimeout(() => {
                resultDiv.style.display = 'none';
                scanPaused = false;
            }, 5000);
        }
        
        // Pausar el escáner mientras se muestra el mensaje
        scanPaused = true;
    }

    // Llamada al API cuando se detecta un código QR
    function onScanSuccess(decodedText) {
        if (scanPaused) return;
        
        const now = Date.now();
        if (now - lastScanTime < 3000) return; // debounce simple
        lastScanTime = now;
        
        const statusSpan = document.getElementById('status-text');
        statusSpan.innerText = 'Procesando petición...';
        
        // Envío POST con formato application/x-www-form-urlencoded (evita CORS preflight)
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'uuid=' + encodeURIComponent(decodedText)
        })
        .then(async response => {
            // Intentamos parsear la respuesta como JSON, si falla mostramos el texto crudo
            const contentType = response.headers.get('content-type');
            let responseData;
            if (contentType && contentType.includes('application/json')) {
                responseData = await response.json();
            } else {
                // Si no es JSON, obtenemos el texto plano (posible error HTML o texto)
                const textBody = await response.text();
                responseData = { success: false, error: `Respuesta no JSON (HTTP ${response.status}): ${textBody.substring(0, 500)}` };
            }
            return responseData;
        })
        .then(data => {
            // Verificar si la API indica éxito (depende de la estructura que devuelva)
            // Se espera que el API devuelva { success: true, alumno: {...}, asistencia: {...} }
            // o { success: false, error: "mensaje" }.
            if (data && data.success === true) {
                // Éxito: mostrar los datos completos del alumno
                showMessage(true, data);
                // Sonido opcional (si el navegador lo permite)
                try {
                    new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3').play().catch(e => console.log("Sonido bloqueado"));
                } catch(e) {}
            } else {
                // Error devuelto por el API: mostramos el objeto completo que vino del servidor
                // Esto garantiza ver el mensaje de error exacto, incluyendo campos adicionales.
                showMessage(false, data);
            }
        })
        .catch(err => {
            console.error("Network/parse error:", err);
            // Error de red o de parsing: mostramos el error técnico completo
            const errorDetails = {
                tipo: "Error de conexión o red",
                mensaje: err.message,
                stack: err.stack ? err.stack.split('\n')[0] : 'no stack',
                timestamp: new Date().toISOString()
            };
            showMessage(false, errorDetails);
        })
        .finally(() => {
            statusSpan.innerText = 'Esperando código QR...';
        });
    }

    // Función opcional para errores del lector (no crítica)
    function onScanError(errorMessage) {
        // Silencioso para no molestar, solo en consola si es necesario
        // console.debug("Scan error (ignorado):", errorMessage);
    }

    // Inicializar escáner HTML5-QR
    const html5QrCode = new Html5QrcodeScanner(
        "qr-reader",
        { fps: 10, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0, disableFlip: false },
        false
    );
    html5QrCode.render(onScanSuccess, onScanError);
</script>
</body>
</html>
